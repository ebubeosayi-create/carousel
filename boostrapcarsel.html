<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>carousel</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>

    <style>
        .body{
            background-color: deepskyblue;
        }
        .carousel-inner img{
            width: 50%;
            height: 600px;
            object-fit: cover;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Carousel Example</h1>
        <div id="my-Carousel" class="carousel slide" data-ride="Carousel slide">
            <ol class="carousel-indicators">
                <li data-target="#myCarousel" data-slide-to="0" class="active"></li>
                <li data-target="#myCarousel" data-slide-to="1" ></li>
                <li data-target="#myCarousel" data-slide-to="2" ></li>
                <li data-target="#myCarousel" data-slide-to="3" ></li>
            </ol>
            <div class="carousel-inner">
                <div class="item active">
                    <img src="bachira2.webp" alt="Image1">
                </div>

                <div class="item">
                    <img src="isagi.webp" alt="Image2">
                </div>

                <div class="item">
                    <img src="kaiser2.webp" alt="Image3">
                </div>

                <div class="item">
                    <img src="rin.webp" alt="Image4">
                </div>
            </div>
            <a class="left carousel-control" href="#my-Carousel" data data-slide="prev">
<span class="glyphicon glyphicon-chevron-left"></span>

</a>

<a class="right carousel-control" href="#my-Carousel" data-slide="next">

<span class="glyphicon glyphicon-chevron-right"></span>
        </div>
    </div>
    <div>
        <h2></h2>
    </div>
    
</body>
</html>
